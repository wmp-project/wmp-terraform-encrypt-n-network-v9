service:
  type: LoadBalancer
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
    service.beta.kubernetes.io/aws-load-balancer-ssl-cert: "arn:aws:acm:us-east-1:739561048503:certificate/357141e3-f378-4020-a8f5-b9d69a94316f"
    service.beta.kubernetes.io/aws-load-balancer-ssl-ports: "443"
    service.beta.kubernetes.io/aws-load-balancer-backend-protocol: "http"

ports:
  web:
    port: 80
    exposedPort: 80

  websecure:
    port: 8000
    exposedPort: 443

logs:
  general:
    level: DEBUG

additionalArguments:
  - "--accesslog=true"
  - "--api.dashboard=true"
  - "--api.insecure=true"

